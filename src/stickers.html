<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DibujaSimple - Sticker Library 🎉</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 1rem;
        }

        .sticker-panel {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 1rem;
            font-size: 2rem;
        }

        .category-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            background: #f0f0f0;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .tab-btn:hover { background: #e0e0e0; }
        .tab-btn.active { background: #667eea; color: white; }

        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 0.5rem;
            padding: 0.5rem;
        }

        .sticker-item {
            aspect-ratio: 1;
            background: #f8f9fa;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px dashed #ddd;
        }

        .sticker-item:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: #667eea;
        }

        /* Categories */
        .animals { background: linear-gradient(135deg, #FF6B6B, #4ECDC4); }
        .nature { background: linear-gradient(135deg, #95E1D9, #F38181); }
        .space { background: linear-gradient(135deg, #4ECDC4, #5F27CD); }
        .funny { background: linear-gradient(135deg, #FF9F43, #FECA57); }

        h2.category-title {
            color: #667eea;
            margin-bottom: 0.5rem;
            font-size: 1.3rem;
        }

        .count {
            float: right;
            color: #888;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="sticker-panel">
        <h1>🎨 Sticker Library - DibujaSimple</h1>
        
        <!-- Category Tabs -->
        <div class="category-tabs">
            <button class="tab-btn active" onclick="showCategory('animals')">🐾 Animales (12)</button>
            <button class="tab-btn" onclick="showCategory('nature')">🌿 Naturaleza (15)</button>
            <button class="tab-btn" onclick="showCategory('space')">🚀 Espacio (10)</button>
            <button class="tab-btn" onclick="showCategory('funny')">😂 Divertidos (20)</button>
        </div>

        <!-- Sticker Grids -->
        <section id="animals" class="category active">
            <h2 class="category-title">Animales <span class="count">12</span></h2>
            <div class="sticker-grid">
                <div class="sticker-item animals">🦁</div>
                <div class="sticker-item animals">🐯</div>
                <div class="sticker-item animals">🐰</div>
                <div class="sticker-item animals">🐘</div>
                <div class="sticker-item animals">🦄</div>
                <div class="sticker-item animals">🐼</div>
            </div>
        </section>

        <section id="nature" class="category">
            <h2 class="category-title">Naturaleza <span class="count">15</span></h2>
            <div class="sticker-grid">
                <div class="sticker-item nature">🌲</div>
                <div class="sticker-item nature">🌸</div>
                <div class="sticker-item nature">☀️</div>
                <div class="sticker-item nature">🌙</div>
                <div class="sticker-item nature">⛈️</div>
            </div>
        </section>

        <section id="space" class="category">
            <h2 class="category-title">Espacio <span class="count">10</span></h2>
            <div class="sticker-grid">
                <div class="sticker-item space">🚀</div>
                <div class="sticker-item space">⭐</div>
                <div class="sticker-item space">🌍</div>
                <div class="sticker-item space">🪐</div>
                <div class="sticker-item space">👨‍🚀</div>
            </div>
        </section>

        <section id="funny" class="category">
            <h2 class="category-title">Divertidos <span class="count">20</span></h2>
            <div class="sticker-grid">
                <div class="sticker-item funny">🤪</div>
                <div class="sticker-item funny">🎉</div>
                <div class="sticker-item funny">💃</div>
                <div class="sticker-item funny">🕺</div>
                <div class="sticker-item funny">🍕</div>
            </div>
        </section>
    </div>

    <script>
        // Tab navigation
        function showCategory(category) {
            document.querySelectorAll('.category').forEach(el => el.classList.remove('active'));
            document.getElementById(category).classList.add('active');
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        console.log('🎨 [ISSUE #1]: Sticker Library inicializado correctamente');
        console.log('✅ Frontend-Dev: Implementación de drag & drop en progreso');
    </script>
</body>
</html>
